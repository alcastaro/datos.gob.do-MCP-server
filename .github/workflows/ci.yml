name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Build + import smoke test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies (with dev extras)
        run: uv sync --python ${{ matrix.python-version }} --extra dev

      - name: Verify package imports
        run: |
          uv run --python ${{ matrix.python-version }} python -c "
          from datosgobdo_mcp import server, ckan, preview, analytics, cache, download
          assert hasattr(server, 'mcp')
          assert hasattr(server, 'main')
          assert callable(ckan.search_datasets)
          assert callable(preview.preview_resource_data)
          assert callable(analytics.aggregate_resource)
          assert callable(analytics.query_resource)
          print('OK: all modules import cleanly')
          "

      - name: Run pytest (hermetic, no network)
        run: uv run --python ${{ matrix.python-version }} pytest -v

      - name: Verify entry point script
        run: |
          uv run --python ${{ matrix.python-version }} datosgobdo-mcp < /dev/null &
          PID=$!
          sleep 2
          if kill -0 $PID 2>/dev/null; then
            echo "OK: datosgobdo-mcp launched"
            kill $PID
          else
            wait $PID
            EXIT=$?
            # stdio MCP exits cleanly when stdin closes — treat exit 0 as success.
            if [ $EXIT -eq 0 ]; then
              echo "OK: datosgobdo-mcp ran and exited cleanly on EOF"
            else
              echo "FAIL: datosgobdo-mcp died with exit $EXIT"
              exit 1
            fi
          fi

      - name: Build distributable
        run: uv build

      - name: Validate server.json against MCP Registry
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" \
            | tar xz mcp-publisher
          ./mcp-publisher validate
